<!DOCTYPE html>
<html>
<head>
<title>Our Memories</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Our Memories <span onclick="openVIP()" style="cursor:pointer;">❤️</span></h1>

<div class="gallery">

<img src="photos/memories/footballgame1.JPEG">

</div>

<div id="viewer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;">
<span onclick="closeViewer()" style="position:absolute; top:20px; right:40px; font-size:40px; color:white; cursor:pointer;">✕</span>
<img id="viewerImg" style="max-width:90%; max-height:90%; border-radius:10px;">
</div>

<script>

/* enable fullscreen viewing */

const galleryImages = document.querySelectorAll(".gallery img");

galleryImages.forEach(img => {
img.onclick = function(){
openViewer(img.src);
};
});

function openViewer(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

/* VIP page */

function openVIP(){
window.location.href="vip.html";
}

</script>

<audio id="music" autoplay loop>
<source src="music/song.mp3" type="audio/mpeg">
</audio>

</body>
</html>
