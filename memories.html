<!DOCTYPE html>

<html>

<head>
<title>Our Memories</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Our Memories <span onclick="openVIP()" style="cursor:pointer;">❤️</span></h1>

<div id="musicControls">

<div id="songTitle">Loading...</div>

<button onclick="rewindSong()">⏮</button>
<button id="musicButton" onclick="toggleMusic()">⏸</button>
<button onclick="skipSong()">⏭</button>
</div>

</div>

<img src="photos/memories/blue.JPG" loading="lazy">
<img src="photos/memories/footballgame1.JPEG" loading="lazy">
<img src="photos/memories/h.JPG" loading="lazy">
<img src="photos/memories/hgs.JPEG" loading="lazy">
<img src="photos/memories/hi.JPEG" loading="lazy">
<img src="photos/memories/hlwn.JPEG" loading="lazy">
<img src="photos/memories/hs.JPEG" loading="lazy">
<img src="photos/memories/hsd.JPEG" loading="lazy">
<img src="photos/memories/hss.JPEG" loading="lazy">

<img src="photos/memories/huo.JPEG" loading="lazy">

<img src="photos/memories/oi.JPG" loading="lazy">

<img src="photos/memories/ree.JPEG" loading="lazy">
<img src="photos/memories/sc.JPEG" loading="lazy">
<img src="photos/memories/sleep.JPEG" loading="lazy">
<img src="photos/memories/usuo.JPG" loading="lazy">
<img src="photos/memories/walk.JPEG" loading="lazy">

</div>

<div id="viewer">

<div id="leftArrow" class="arrow" onclick="prevImage()">❮</div>

<img id="viewerImg">

<div id="rightArrow" class="arrow" onclick="nextImage()">❯</div>

<span onclick="closeViewer()">✕</span>

</div>

<audio id="music"></audio>

<script>

/* PHOTO VIEWER */

let images = Array.from(document.querySelectorAll(".gallery img"));
let currentIndex = 0;

images.forEach((img,index)=>{
img.onclick=function(){
currentIndex=index;
openViewer(img.src);
};
});

function openViewer(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

/* SWIPE */

let startX=0;

document.getElementById("viewer").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.getElementById("viewer").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(endX<startX-50){nextImage();}
if(endX>startX+50){prevImage();}
});

function nextImage(){
currentIndex++;
if(currentIndex>=images.length){currentIndex=0;}
document.getElementById("viewerImg").src=images[currentIndex].src;
}

function prevImage(){
currentIndex--;
if(currentIndex<0){currentIndex=images.length-1;}
document.getElementById("viewerImg").src=images[currentIndex].src;
}

/* VIP LINK */

function openVIP(){
window.location.href="vip.html";
}

/* MUSIC */

const songs=[
"music/Body.mp3",
"music/e85.mp3",
"music/nkeemp3.mp3",
"music/ordinary.mp3"
];

let music=document.getElementById("music");
let musicButton=document.getElementById("musicButton");

songs.sort(()=>Math.random()-0.5);

let currentSong=0;

function playSong(){

music.src = songs[currentSong];

updateSongTitle();

music.play().catch(()=>{});
function updateSongTitle(){

let name = songs[currentSong]
.split("/")
.pop()
.replace(".mp3","");

document.getElementById("songTitle").textContent = name;

}

}

music.addEventListener("ended",function(){

currentSong++;

if(currentSong>=songs.length){
songs.sort(()=>Math.random()-0.5);
currentSong=0;
}

playSong();

});

function toggleMusic(){

if(music.paused){
music.play();
musicButton.textContent="⏸";
}else{
music.pause();
musicButton.textContent="▶";
}

}

function rewindSong(){
music.currentTime=0;
}

function skipSong(){

currentSong++;

if(currentSong>=songs.length){
currentSong=0;
}

playSong();

}

/* START MUSIC AFTER FIRST TAP (PHONES) */

window.addEventListener("load",function(){

document.body.addEventListener("click",function(){

if(music.src===""){
playSong();
}

},{once:true});

});

</script>

</body>
</html>
