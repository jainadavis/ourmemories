<!DOCTYPE html>
<html>
<head>
<title>Our Memories</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Our Memories <span onclick="openVIP()" style="cursor:pointer;">❤️</span></h1>

<div class="gallery">

<img src="photos/memories/footballgame1.JPEG">

</div>

<div id="viewer">
<span onclick="closeViewer()">✕</span>
<img id="viewerImg">
</div>

<script>

let images = Array.from(document.querySelectorAll(".gallery img"));
let currentIndex = 0;

images.forEach((img, index) => {
img.onclick = function(){
currentIndex = index;
openViewer(img.src);
};
});

function openViewer(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src = src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

function openVIP(){
window.location.href="vip.html";
}

/* swipe support */

let startX = 0;

document.getElementById("viewer").addEventListener("touchstart", e=>{
startX = e.touches[0].clientX;
});

document.getElementById("viewer").addEventListener("touchend", e=>{

let endX = e.changedTouches[0].clientX;

if(endX < startX - 50){
nextImage();
}

if(endX > startX + 50){
prevImage();
}

});

function nextImage(){
currentIndex++;
if(currentIndex >= images.length){
currentIndex = 0;
}
document.getElementById("viewerImg").src = images[currentIndex].src;
}

function prevImage(){
currentIndex--;
if(currentIndex < 0){
currentIndex = images.length - 1;
}
document.getElementById("viewerImg").src = images[currentIndex].src;
}

</script>

<audio id="music" loop>
<source src="music/song.mp3" type="audio/mpeg">
</audio>

<script>
document.body.addEventListener("click", function(){
let music = document.getElementById("music");
music.play();
}, { once: true });
</script>
<audio id="music" autoplay loop>
<source src="music/song.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", function(){
let music = document.getElementById("music");
music.play().catch(()=>{});
});
</script>
</body>
</html>
