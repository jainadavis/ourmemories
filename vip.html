<!DOCTYPE html>
<html>
<head>
<title>VIP Only</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>VIP Only 🔒</h1>

<div class="gallery" id="gallery"></div>

<div id="viewer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;">
<span onclick="closeViewer()" style="position:absolute; top:20px; right:40px; font-size:40px; color:white; cursor:pointer;">✕</span>
<img id="viewerImg" style="max-width:90%; max-height:90%; border-radius:10px;">
</div>

<script>

/* LIST YOUR VIP PHOTOS HERE */

const images = [
"vip1.JPEG"
];

const gallery = document.getElementById("gallery");

images.forEach(photo => {

let img = document.createElement("img");
img.src = "photos/vip/" + photo;

img.onclick = () => {
openViewer(img.src);
};

gallery.appendChild(img);

});

function openViewer(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src = src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

</script>

</body>
<script>
if(localStorage.getItem("unlocked") !== "true"){
window.location.href = "index.html";
}
</script>
</html>
