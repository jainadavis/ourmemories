<!DOCTYPE html>
<html>
<head>
<title>Just For You</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<audio id="music"></audio>
<body>

<button class="back-btn" onclick="goBack()">← Back</button>

<h1>Just For You ❤️</h1>

<div class="gallery">

<img src="photos/vip/vip1.JPEG">
<img src="photos/vip/vip2.JPEG">

</div>

<div id="viewer">
<span onclick="closeViewer()">✕</span>
<img id="viewerImg">
</div>

<script>

let images = Array.from(document.querySelectorAll(".gallery img"));
let currentIndex = 0;

images.forEach((img, index) => {
img.onclick = function(){
currentIndex = index;
openViewer(img.src);
};
});

function openViewer(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src = src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

function goBack(){
window.location.href="memories.html";
}

/* swipe support */

let startX = 0;

document.getElementById("viewer").addEventListener("touchstart", e=>{
startX = e.touches[0].clientX;
});

document.getElementById("viewer").addEventListener("touchend", e=>{

let endX = e.changedTouches[0].clientX;

if(endX < startX - 50){
nextImage();
}

if(endX > startX + 50){
prevImage();
}

});

function nextImage(){
currentIndex++;
if(currentIndex >= images.length){
currentIndex = 0;
}
document.getElementById("viewerImg").src = images[currentIndex].src;
}

function prevImage(){
currentIndex--;
if(currentIndex < 0){
currentIndex = images.length - 1;
}
document.getElementById("viewerImg").src = images[currentIndex].src;
}

</script>

<script>
const starContainer = document.querySelector(".stars");

for(let i=0;i<40;i++){

let star = document.createElement("div");
star.className="star";

/* random position */

star.style.top = Math.random()*100 + "%";
star.style.left = Math.random()*100 + "%";

/* random twinkle timing */

star.style.animationDelay = Math.random()*5 + "s";
star.style.animationDuration = (2 + Math.random()*4) + "s";

/* random size */

let size = 4 + Math.random()*4;
star.style.width = size + "px";
star.style.height = size + "px";

starContainer.appendChild(star);

/* occasional sparkle */

setInterval(()=>{

if(Math.random() < 0.15){

star.style.transform = "scale(2) rotate(45deg)";
star.style.boxShadow =
"0 0 12px gold, 0 0 20px gold";

setTimeout(()=>{
star.style.transform = "scale(1) rotate(45deg)";
star.style.boxShadow =
"0 0 6px rgba(255,215,0,0.8), 0 0 12px rgba(255,215,0,0.5)";
},300);

}

},2000);

}
</script>
<script>

/* MUSIC SYSTEM */

const songs = [
"music/Body.mp3",
"music/e85.mp3",
"music/nkeemp3.mp3",
"music/ordinary.mp3"
];

let music = document.getElementById("music");

/* shuffle songs */

songs.sort(() => Math.random() - 0.5);

let currentSong = 0;

function playSong(){
music.src = songs[currentSong];
music.play().catch(()=>{});
}

music.addEventListener("ended", function(){

currentSong++;

if(currentSong >= songs.length){
songs.sort(() => Math.random() - 0.5);
currentSong = 0;
}

playSong();

});

/* start music */

window.addEventListener("load", function(){

playSong();

document.body.addEventListener("click", function(){
music.play();
}, {once:true});

});

</script>
<body>

<div class="stars"></div>
</html>
